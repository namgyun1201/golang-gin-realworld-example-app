version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    # Bug detection
    - staticcheck
    - govet
    - ineffassign

    # Style
    - misspell

    # Code quality
    - unused
    - errcheck

    # Security
    - gosec

  settings:
    misspell:
      locale: US
    gosec:
      excludes:
        - G101
      config:
        global:
          nosec: true
    errcheck:
      exclude-functions:
        - (*gorm.io/gorm.DB).AutoMigrate
        - (github.com/gin-gonic/gin.ResponseWriter).Write

  exclusions:
    # Exclude test files from strict linters
    rules:
      - path: '_test\.go'
        linters:
          - errcheck
          - gosec
          - ineffassign
      # Pre-existing style issues in source code
      - text: 'ST1005:'
        linters:
          - staticcheck
      - text: 'ST1006:'
        linters:
          - staticcheck
      - text: 'QF1008:'
        linters:
          - staticcheck
    paths:
      - vendor
      - data

run:
  timeout: 5m
  build-tags:
    - integration
    - e2e
